
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>咔咔 StyleWeave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'PingFang SC', 'Microsoft YaHei', 'sans-serif'],
              serif: ['Playfair Display', 'Songti SC', 'serif'],
            },
            colors: {
              fashion: {
                dark: '#f0f4ff',    // Lighter Blue-ish Page Background
                panel: '#ffffff',   // White Card Background
                accent: '#3370ff',  // ByteDance Blue
                text: '#1f2937',    // Dark Gray Text
                subtext: '#9ca3af'  // Light Gray Text
              }
            },
            animation: {
              'gradient-x': 'gradient-x 2s linear infinite',
              'fade-in': 'fadeIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'slide-up': 'slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
              'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            },
            keyframes: {
              'gradient-x': {
                '0%, 100%': {
                  'background-size': '200% 200%',
                  'background-position': 'left center'
                },
                '50%': {
                  'background-size': '200% 200%',
                  'background-position': 'right center'
                },
              },
              fadeIn: {
                'from': { opacity: '0', transform: 'translateY(10px)' },
                'to': { opacity: '1', transform: 'translateY(0)' },
              },
              slideUp: {
                'from': { transform: 'translateY(40px)', opacity: '0' },
                'to': { transform: 'translateY(0)', opacity: '1' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-20px)' },
              }
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      body {
        background: #f8fafc;
        color: #1f2937;
        min-height: 100vh;
        overflow-x: hidden; 
      }
      
      /* 
       * FLUID ENGINE 4.0 - Standard App Background (Ethereal Blue)
       */
      .liquid-acrylic-bg {
        background-color: #ffffff;
        background-image: 
            radial-gradient(at 0% 0%, hsla(210, 100%, 90%, 1) 0, transparent 50%),
            radial-gradient(at 100% 0%, hsla(220, 100%, 85%, 1) 0, transparent 50%),
            radial-gradient(at 100% 100%, hsla(240, 100%, 95%, 1) 0, transparent 50%),
            radial-gradient(at 0% 100%, hsla(330, 100%, 90%, 0.5) 0, transparent 50%);
      }
      
      .liquid-acrylic-bg::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
            radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.8), transparent 50%),
            radial-gradient(at 80% 0%, hsla(210, 90%, 60%, 0.2) 0px, transparent 50%),
            radial-gradient(at 0% 50%, hsla(190, 100%, 70%, 0.2) 0px, transparent 50%),
            radial-gradient(at 80% 50%, hsla(260, 80%, 70%, 0.15) 0px, transparent 50%);
        background-size: 100% 100%;
        opacity: 0.8;
        pointer-events: none;
      }

      /*
       * WELCOME SCREEN BACKGROUND - Ocean Deep Blue Flow
       * Colors: Navy, Cyan, Electric Blue
       */
      .welcome-flow-bg {
        background-color: #020617; /* Very Dark Blue */
        background-image:
            radial-gradient(at 10% 20%, hsla(220, 100%, 25%, 1) 0, transparent 50%),  /* Navy */
            radial-gradient(at 90% 10%, hsla(200, 100%, 35%, 1) 0, transparent 50%),  /* Blue */
            radial-gradient(at 80% 90%, hsla(220, 80%, 30%, 1) 0, transparent 50%),   /* Dark Blue */
            radial-gradient(at 10% 90%, hsla(190, 100%, 25%, 1) 0, transparent 50%);  /* Cyan Dark */
      }

      .welcome-flow-bg::after {
        content: "";
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background-image: 
            radial-gradient(at 20% 20%, hsla(210, 100%, 50%, 0.3) 0px, transparent 40%),   /* Bright Blue */
            radial-gradient(at 80% 0%, hsla(190, 100%, 60%, 0.2) 0px, transparent 40%),    /* Cyan */
            radial-gradient(at 10% 60%, hsla(230, 80%, 40%, 0.3) 0px, transparent 50%),    /* Deep Blue */
            radial-gradient(at 70% 60%, hsla(180, 100%, 40%, 0.2) 0px, transparent 50%);   /* Teal */
        background-size: 100% 100%;
        opacity: 0.8; 
        pointer-events: none;
      }
      
      @keyframes gradient-move {
        0% { transform: translate(0, 0); }
        50% { transform: translate(2%, 2%); }
        100% { transform: translate(-2%, 2%); }
      }

      .scrollbar-hide::-webkit-scrollbar {
          display: none;
      }
      .scrollbar-hide {
          -ms-overflow-style: none;
          scrollbar-width: none;
      }

      /* Refined Range Slider */
      input[type=range] {
        -webkit-appearance: none; 
        background: transparent; 
        height: 24px;
        padding: 0;
        margin: 0;
      }
      input[type=range]:focus {
        outline: none;
      }
      input[type=range]::-webkit-slider-runnable-track {
        width: 100%;
        height: 6px;
        cursor: pointer;
        background: rgba(0,0,0,0.06); /* Changed from rgba(255,255,255,0.5) for better visibility */
        border-radius: 999px;
        border: none;
      }
      input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        height: 18px;
        width: 18px;
        border-radius: 50%;
        background: #ffffff;
        border: 4px solid #3370ff;
        cursor: pointer;
        margin-top: -6px;
        box-shadow: 0 2px 5px rgba(51, 112, 255, 0.3);
        transition: transform 0.1s ease;
      }
      input[type=range]::-webkit-slider-thumb:hover {
        transform: scale(1.1);
      }
      input[type=range]::-webkit-slider-thumb:active {
        transform: scale(0.95);
      }
    </style>

{

}
</script>
